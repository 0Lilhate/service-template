# Liquibase CLI defaults file — consumed by the org.liquibase.gradle plugin
# via the `defaultsFile` activity argument (maps to Liquibase's --defaults-file).
#
# Local development defaults. For CI / staging / prod override via environment
# or command-line flags:
#   ./gradlew :service-db:update \
#     -PliquibaseUrl=jdbc:postgresql://prod:5432/payments \
#     -PliquibaseUsername=ci \
#     -PliquibasePassword=$DB_PASSWORD
#
# Any Gradle property of the form -PliquibaseXxx overrides the property xxx
# from this file (built-in behaviour of the plugin).

changelogFile=db/changelog/db.changelog-master.yaml
searchPath=src/main/resources

url=jdbc:postgresql://localhost:5432/service_template
username=postgres
password=postgres
driver=org.postgresql.Driver

logLevel=info
